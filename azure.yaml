# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# This is the configuration file for Azure AI Foundry, defining the agent, its environment, and infrastructure.
# Automatically generated based on the agent.yaml and additional settings for Azure deployment using `azd init`.

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: ai-foundry-starter-basic
services:
    agent-architecture-review-sample:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.25"
                    memory: 0.5Gi
                scale:
                    maxReplicas: 1
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4.1-nano
                    version: "2025-04-14"
                  name: gpt-4.1-nano
                  sku:
                    capacity: 10
                    name: GlobalStandard
            startupCommand: python main.py
infra:
    provider: bicep
    path: ./infra
